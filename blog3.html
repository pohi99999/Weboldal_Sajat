<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Friss hírek és előrejelzések a technológia világából a Pohánka És Társa Kft-től.">
    <title>Tech Hírek - Pohánka És Társa Kft</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #111827; color: #D1D5DB; }
        .content-wrapper { position: relative; z-index: 1; }
        .navbar-logo { max-height: 50px; width: auto; }
        .section-title { font-size: 2.25rem; font-weight: 700; margin-bottom: 2.5rem; text-align: center; color: #F3F4F6; }
        .news-article-card {
            background-color: rgba(31, 41, 55, 0.8);
            border: 1px solid #374151;
            padding: 1.5rem 2rem;
            border-radius: 0.5rem;
            transition: all 0.3s ease;
        }
        .news-article-card:hover {
            border-color: #4b5563;
            transform: translateY(-2px);
        }
        .read-more-button {
            display: inline-block;
            background-color: #3B82F6;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.375rem;
            font-weight: 600;
            text-decoration: none;
            transition: background-color 0.3s ease;
        }
        .read-more-button:hover {
            background-color: #2563EB;
        }
    </style>
</head>
<body class="antialiased">
    <div class="content-wrapper">
        <header class="bg-gray-800/80 backdrop-blur-md shadow-lg sticky top-0 z-40">
            <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
                <div>
                    <a href="index.html" class="flex items-center">
                        <img src="logo.jpg" alt="Pohánka És Társa Kft Logó" class="navbar-logo mr-3" onerror="this.alt='Logó'; this.src='https://placehold.co/150x50/111827/D1D5DB?text=Logó';">
                        <span class="text-xl font-bold text-white">Pohánka És Társa Kft</span>
                    </a>
                </div>
                <div id="nav-links-desktop">
                    <a href="index.html" class="text-gray-300 hover:text-blue-400 px-3 py-2 rounded-md text-sm font-medium">Vissza a főoldalra</a>
                </div>
            </nav>
        </header>

        <main>
            <section id="news-content" class="py-16 md:py-24 bg-gray-900/90">
                <div class="container mx-auto px-6">
                    <h1 class="section-title">Friss Hírek, és Előrejelzések a Techvilágból</h1>
                    <div class="max-w-3xl mx-auto space-y-8">
                        <!-- Bejegyzés 1 -->
                        <article class="news-article-card">
                            <h2 class="text-2xl font-semibold text-white mb-4">
                                Jön az új magyar MI stratégia: Virtuális tantermek és okos ipar a láthatáron
                            </h2>
                            <div class="flex justify-end mt-4">
                                <a href="blog.jpg" class="read-more-button">Olvasd el</a>
                            </div>
                        </article>
                        <!-- Újabb bejegyzések helye ide kerülhet -->
                    </div>
                </div>
            </section>
        </main>

        <footer class="bg-gray-900/95 border-t border-gray-700">
            <div class="container mx-auto px-6 py-8 text-center">
               <p class="text-gray-500 text-sm">© <span id="currentYear"></span> Pohánka És Társa Kft. Minden jog fenntartva.</p>
           </div>
       </footer>
    </div>
    <script>
        document.getElementById('currentYear').textContent = new Date().getFullYear();
    </script>
</body>
</html>
