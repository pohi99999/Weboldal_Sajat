<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Blogbejegyzések, érdekes témák és segédanyagok a Pohánka És Társa Kft-től.">
    <title>Blog - Pohánka És Társa Kft</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #111827; color: #D1D5DB; }
        .content-wrapper { position: relative; z-index: 1; }
        .navbar-logo { max-height: 50px; width: auto; }
        .section-title { font-size: 2.25rem; font-weight: 700; margin-bottom: 1.5rem; text-align: center; color: #F3F4F6; }
        .nav-link-active { color: #3B82F6; }
        .language-selector { background-color: rgba(17, 24, 39, 0.8); padding: 0.5rem 0; }
        .language-link { display: inline-flex; align-items: center; margin: 0 0.75rem; padding: 0.5rem 0.75rem; font-size: 0.875rem; color: #D1D5DB; border-radius: 0.375rem; transition: background-color 0.2s ease-in-out, color 0.2s ease-in-out; cursor: pointer; }
        .language-link:hover, .language-link.active-lang { background-color: #374151; color: #F9FAFB; font-weight: bold; }
        .flag-icon { width: 20px; height: auto; margin-right: 0.5rem; border-radius: 2px; }
    </style>
</head>
<body class="antialiased">
    <div class="content-wrapper">
        <header class="bg-gray-800/80 backdrop-blur-md shadow-lg sticky top-0 z-40">
            <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
                <div>
                    <a href="index.html" class="flex items-center">
                        <img src="logo.jpg" alt="Pohánka És Társa Kft Logó" class="navbar-logo mr-3" onerror="this.alt='Logó'; this.src='https://placehold.co/150x50/111827/D1D5DB?text=Logó';">
                        <span class="text-xl font-bold text-white">Pohánka És Társa Kft</span>
                    </a>
                </div>
                <div id="nav-links-desktop">
                    <a href="index.html" class="text-gray-300 hover:text-blue-400 px-3 py-2 rounded-md text-sm font-medium">Vissza a főoldalra</a>
                </div>
            </nav>
        </header>

        <main>
            <section id="blog-content" class="py-16 md:py-24 bg-gray-900/90">
                <div class="container mx-auto px-6">
                    <h1 class="section-title" data-translate-key="blogPageTitle">Blog bejegyzések, Érdekes témák, segéd anyagok</h1>
                    <div class="max-w-3xl mx-auto text-center">
                        <p class="text-lg text-gray-400">Hamarosan érkezünk friss tartalommal. Itt olvashat majd esettanulmányokat, szakmai cikkeket és egyéb hasznos anyagokat.</p>
                    </div>
                </div>
            </section>
        </main>

        <footer class="bg-gray-900/95 border-t border-gray-700">
             <div class="container mx-auto px-6 py-8 text-center">
                <p class="text-gray-500 text-sm">© <span id="currentYear"></span> Pohánka És Társa Kft. Minden jog fenntartva.</p>
            </div>
        </footer>
    </div>
    <script>
        document.getElementById('currentYear').textContent = new Date().getFullYear();
    </script>
</body>
</html>
